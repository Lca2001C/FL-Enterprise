services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: motopay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn motopay.interfaces.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/motopay
    volumes:
      - .:/app
    depends_on:
      - redis
      - db

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A motopay.infrastructure.messaging.celery_app worker -l INFO
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/motopay
    volumes:
      - .:/app
    depends_on:
      - redis
      - api
      - db

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A motopay.infrastructure.messaging.celery_app beat -l INFO
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/motopay
    volumes:
      - .:/app
    depends_on:
      - redis
      - db

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m motopay.infrastructure.telegram.bot_main
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/motopay
    volumes:
      - .:/app
    depends_on:
      - api
      - db

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    command: streamlit run apps/streamlit_dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/motopay
    volumes:
      - .:/app
    depends_on:
      - api
      - db

volumes:
  postgres_data:
