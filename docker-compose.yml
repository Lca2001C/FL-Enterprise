services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-motopay}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      # Redis sem senha — nunca expor além do host local.
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: uvicorn motopay.interfaces.api.asgi:app --host 0.0.0.0 --port 8000
    ports:
      - "0.0.0.0:8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-motopay}
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
    volumes:
      - uploads_data:/data/uploads
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A motopay.infrastructure.messaging.celery_app worker -l INFO -Q default,telegram,billing
    ports:
      # Métricas Prometheus internas — não expor além do host local.
      - "127.0.0.1:9808:9808"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-motopay}
      REDIS_URL: redis://redis:6379/0
      WORKER_METRICS_HOST: 0.0.0.0
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9808/metrics', timeout=5)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A motopay.infrastructure.messaging.celery_app beat -l INFO --schedule=/data/celerybeat-schedule
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-motopay}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - celery_beat_data:/data
    user: "1000:1000"
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: python -m motopay.infrastructure.telegram.bot_main
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-motopay}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      api:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "scripts/healthcheck_bot.py"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./apps/motopay-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-SAME_ORIGIN}
        VITE_MERCADOPAGO_PUBLIC_KEY: ${MERCADOPAGO_VITE_PUBLIC_KEY:-${MERCADOPAGO_PUBLIC_KEY_TEST:-}}
        VITE_DISABLE_PWA: ${VITE_DISABLE_PWA:-true}
    restart: unless-stopped
    ports:
      - "0.0.0.0:5173:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  celery_beat_data:
  uploads_data:
