services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: motopay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d motopay"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn motopay.interfaces.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/motopay
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A motopay.infrastructure.messaging.celery_app worker -l INFO
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/motopay
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      api:
        condition: service_started

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A motopay.infrastructure.messaging.celery_app beat -l INFO --schedule=/data/celerybeat-schedule
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/motopay
    volumes:
      - .:/app
      - celery_beat_data:/data
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m motopay.infrastructure.telegram.bot_main
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/motopay
    volumes:
      - .:/app
    depends_on:
      api:
        condition: service_started
      db:
        condition: service_healthy

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    command: streamlit run apps/streamlit_dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/motopay
      - PYTHONPATH=/app:/app/apps/streamlit_dashboard
    volumes:
      - .:/app
    depends_on:
      api:
        condition: service_started
      db:
        condition: service_healthy

volumes:
  postgres_data:
  celery_beat_data:
