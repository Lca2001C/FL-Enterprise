# Blueprint Render (Infrastructure as Code) — MotoPay Admin
#
# Como usar:
#   1. Suba este arquivo no repositório.
#   2. No Render: New → Blueprint → conecte o repo. O Render cria Postgres, Redis
#      (Key Value), API, worker e beat de uma vez a partir do Dockerfile da raiz.
#   3. Preencha os valores marcados como `sync: false` (secrets) quando solicitado:
#      JWT_SECRET, credenciais Mercado Pago, Telegram, S3 e as URLs públicas.
#
# O frontend (apps/motopay-frontend) é um serviço separado — veja DEPLOY.md
# (seção Render), pois usa outro Dockerfile e precisa de VITE_API_BASE_URL no build.
#
# Detalhes e checklist completo: DEPLOY.md.

databases:
  - name: motopay-db
    databaseName: motopay
    user: motopay
    plan: free # troque para 'basic-256mb'+ em produção real

# Variáveis compartilhadas entre API, worker e beat (preenchidas uma vez).
# DATABASE_URL e REDIS_URL NÃO entram aqui: são injetadas por serviço via
# fromDatabase/fromService (o grupo não suporta esses tipos).
envVarGroups:
  - name: motopay-shared
    envVars:
      - key: ENVIRONMENT
        value: production
      # Mesmo segredo em todos os serviços — gere com: openssl rand -hex 32
      - key: JWT_SECRET
        sync: false
      # Redis interno do Render é rede privada e sem senha — aceitar explicitamente.
      - key: ALLOW_PRODUCTION_REDIS_WITHOUT_AUTH
        value: "true"
      # Atrás do proxy do Render: confie na faixa privada para o rate-limit ver o IP real.
      - key: TRUSTED_PROXY_IPS
        value: 10.0.0.0/8
      # --- Mercado Pago (produção) ---
      - key: MERCADOPAGO_CREDENTIALS_MODE
        value: production
      - key: MERCADOPAGO_ACCESS_TOKEN
        sync: false
      - key: MERCADOPAGO_PUBLIC_KEY
        sync: false
      - key: MERCADOPAGO_WEBHOOK_SECRET
        sync: false
      - key: MERCADOPAGO_OAUTH_CLIENT_ID
        sync: false
      - key: MERCADOPAGO_OAUTH_CLIENT_SECRET
        sync: false
      # --- Telegram ---
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      # --- URLs públicas (preencha com a URL do serviço API/admin no Render) ---
      - key: API_PUBLIC_BASE_URL
        sync: false
      - key: PAYER_PORTAL_BASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      # --- Storage de fotos: disco do Render é efêmero → S3/R2 obrigatório ---
      - key: STORAGE_BACKEND
        value: s3
      - key: S3_BUCKET
        sync: false
      - key: S3_ENDPOINT_URL # vazio p/ AWS; URL do endpoint p/ R2/B2/Spaces
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      # --- Observabilidade (opcional, recomendado) ---
      - key: SENTRY_DSN
        sync: false

services:
  # Redis (Key Value) — rede privada interna do Render.
  - type: redis
    name: motopay-redis
    plan: free # troque para um plano pago em produção real
    ipAllowList: [] # somente conexões internas (sem acesso externo)

  # API HTTP (FastAPI) — o comando padrão do Dockerfile usa o $PORT do Render.
  - type: web
    name: motopay-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /health
    envVars:
      - fromGroup: motopay-shared
      - key: DATABASE_URL
        fromDatabase:
          name: motopay-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: motopay-redis
          property: connectionString
    # Aplica as migrações antes de cada release entrar em tráfego.
    preDeployCommand: alembic -c /app/alembic.ini upgrade head

  # Celery worker (filas default, telegram, billing).
  - type: worker
    name: motopay-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    dockerCommand: celery -A motopay.infrastructure.messaging.celery_app worker -l INFO -Q default,telegram,billing
    envVars:
      - fromGroup: motopay-shared
      - key: DATABASE_URL
        fromDatabase:
          name: motopay-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: motopay-redis
          property: connectionString

  # Celery beat (agendador: cobranças diárias, refresh de tokens OAuth, etc.).
  - type: worker
    name: motopay-beat
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    dockerCommand: celery -A motopay.infrastructure.messaging.celery_app beat -l INFO
    envVars:
      - fromGroup: motopay-shared
      - key: DATABASE_URL
        fromDatabase:
          name: motopay-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: motopay-redis
          property: connectionString

  # Bot Telegram (long-polling). Opcional: remova se não usar o bot.
  - type: worker
    name: motopay-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    dockerCommand: python -m motopay.infrastructure.telegram.bot_main
    envVars:
      - fromGroup: motopay-shared
      - key: DATABASE_URL
        fromDatabase:
          name: motopay-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: motopay-redis
          property: connectionString
