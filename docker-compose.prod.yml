# Overlay de produção — use com:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d
#
# Exige no .env: POSTGRES_PASSWORD, REDIS_PASSWORD (senhas fortes; não use postgres/postgres)
# e DOMAIN (ex.: app.seudominio.com, com DNS apontando para este servidor).
# HTTPS automático (Let's Encrypt) via Caddy — única entrada pública (80/443).
# Passo a passo completo: DEPLOY.md.

services:
  db:
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

  redis:
    ports: !reset []
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENVIRONMENT: production
    # Só acesso local no VPS (smoke tests); o tráfego público entra pelo Caddy
    # → frontend (nginx) → api.
    ports: !override
      - "127.0.0.1:8000:8000"

  worker:
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENVIRONMENT: production
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9808/metrics', timeout=5)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  beat:
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENVIRONMENT: production
    user: "1000:1000"

  bot:
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENVIRONMENT: production
    healthcheck:
      test: ["CMD", "python", "scripts/healthcheck_bot.py"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    # Sem porta pública: o Caddy é a única entrada (80/443 com TLS).
    ports: !reset []

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: "${DOMAIN:?Defina DOMAIN no .env, ex. app.seudominio.com}"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_started

  backup:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - postgres_backups:/backups
      - ./scripts/backup_postgres.sh:/usr/local/bin/backup_postgres.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          /usr/local/bin/backup_postgres.sh
          sleep 86400
        done
    restart: unless-stopped

volumes:
  postgres_backups:
  caddy_data:
  caddy_config:
