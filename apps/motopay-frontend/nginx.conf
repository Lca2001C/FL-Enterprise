server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Re-resolve Docker service names when containers restart (evita 502 por IP antigo).
    resolver 127.0.0.11 valid=30s ipv6=off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; worker-src 'self' blob:; manifest-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://sdk.mercadopago.com https://*.mercadopago.com https://*.mlstatic.com https://http2.mlstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.mlstatic.com; img-src 'self' data: blob: https://*.mlstatic.com https://*.mercadopago.com https://*.mercadolibre.com https://*.mercadolivre.com https://*.mercadolivre.com.br; connect-src 'self' http://localhost:* http://127.0.0.1:* ws: wss: https://api.mercadopago.com https://events.mercadopago.com https://*.mercadopago.com https://*.mercadolibre.com https://*.mercadolivre.com https://*.mercadolivre.com.br https://*.mlstatic.com https://http2.mlstatic.com; font-src 'self' data: https://fonts.gstatic.com https://*.mlstatic.com; frame-src https://www.mercadopago.com https://www.mercadopago.com.br https://mercadopago.com https://*.mercadopago.com https://*.mlstatic.com https://www.mercadolibre.com https://*.mercadolibre.com https://www.mercadolivre.com.br https://*.mercadolivre.com.br https://*.mercadolivre.com; child-src https://*.mercadopago.com https://*.mlstatic.com https://*.mercadolibre.com https://*.mercadolivre.com https://*.mercadolivre.com.br; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    location /api/ {
        set $api_upstream api:8000;
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 6m;
    }

    location = /health {
        set $api_upstream api:8000;
        proxy_pass http://$api_upstream/health;
        proxy_set_header Host $http_host;
    }

    location /alerts {
        set $api_upstream api:8000;
        proxy_pass http://$api_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /socket.io/ {
        set $api_upstream api:8000;
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /workbox- {
        add_header Cache-Control "no-cache";
    }

    location /manifest.webmanifest {
        add_header Content-Type "application/manifest+json";
        add_header Cache-Control "public, max-age=86400";
    }

    location = /favicon.ico {
        add_header Cache-Control "public, max-age=604800";
    }

    location /icons/ {
        add_header Cache-Control "public, max-age=604800";
    }

    location /splash/ {
        add_header Cache-Control "public, max-age=604800";
    }

    location /screenshots/ {
        add_header Cache-Control "public, max-age=604800";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    location /assets/ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
