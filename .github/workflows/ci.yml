name: CI

permissions:
  contents: read

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: motopay_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d motopay_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/motopay_test
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/motopay_test
      REDIS_URL: redis://localhost:6379/0
      TEST_REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-test-jwt-secret
      ASAAS_WEBHOOK_TOKEN: ci-webhook-token
      ENVIRONMENT: development
      LOGIN_RATE_LIMIT_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: python -m pip install -e ".[dev]"

      - name: Ruff
        run: ruff check motopay tests scripts

      - name: Pytest
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/motopay-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/motopay-frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Vitest
        run: npm test

      - name: Typecheck and build
        run: npm run build
